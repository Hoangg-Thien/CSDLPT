spring:
  application:
    name: ride-app
  datasource:
    url: jdbc:postgresql://localhost:5436/rideapp
    username: admin
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

app:
  regions:
    south:
      primary-url: jdbc:postgresql://localhost:5436/rideapp
      replica-url: jdbc:postgresql://localhost:5437/rideapp
      username: admin
      password: secret
    north:
      primary-url: jdbc:postgresql://localhost:5438/rideapp
      replica-url: jdbc:postgresql://localhost:5439/rideapp
      username: admin
      password: secret
  failover:
    timeout-ms: 3000

server:
  port: 8080
