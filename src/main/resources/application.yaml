spring:
  application:
    name: ride-app
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

app:
  regions:
    south:
      primary-url: jdbc:postgresql://localhost:5432/rideapp
      replica-url: jdbc:postgresql://localhost:5433/rideapp
      username: admin
      password: secret
    north:
      primary-url: jdbc:postgresql://localhost:5434/rideapp
      replica-url: jdbc:postgresql://localhost:5435/rideapp
      username: admin
      password: secret
  failover:
    timeout-ms: 3000

server:
  port: 8080