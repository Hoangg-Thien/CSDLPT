services:
  pg-south-primary:
    image: postgres:16
    container_name: pg-south-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: rideapp
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST_AUTH_METHOD: trust
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=3
      - -c
      - max_replication_slots=3
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5436:5432"
    volumes:
      - pg_south_primary_data:/var/lib/postgresql/data
      - ./init-scripts/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./init-scripts/01-setup-replication.sql:/docker-entrypoint-initdb.d/01-setup-replication.sql:ro
      - ./init-scripts/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
      - ./init-scripts/seed_south.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rideapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  pg-south-replica:
    image: postgres:16
    container_name: pg-south-replica
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: pg-south-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replica_secret
    command: ["bash", "/scripts/bootstrap-replica.sh"]
    depends_on:
      pg-south-primary:
        condition: service_healthy
    ports:
      - "5437:5432"
    volumes:
      - pg_south_replica_data:/var/lib/postgresql/data
      - ./scripts/bootstrap-replica.sh:/scripts/bootstrap-replica.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rideapp || pg_isready -U replicator"]
      interval: 5s
      timeout: 5s
      retries: 10

  pg-north-primary:
    image: postgres:16
    container_name: pg-north-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: rideapp
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST_AUTH_METHOD: trust
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=3
      - -c
      - max_replication_slots=3
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5438:5432"
    volumes:
      - pg_north_primary_data:/var/lib/postgresql/data
      - ./init-scripts/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./init-scripts/01-setup-replication.sql:/docker-entrypoint-initdb.d/01-setup-replication.sql:ro
      - ./init-scripts/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
      - ./init-scripts/seed_north.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rideapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  pg-north-replica:
    image: postgres:16
    container_name: pg-north-replica
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: pg-north-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replica_secret
    command: ["bash", "/scripts/bootstrap-replica.sh"]
    depends_on:
      pg-north-primary:
        condition: service_healthy
    ports:
      - "5439:5432"
    volumes:
      - pg_north_replica_data:/var/lib/postgresql/data
      - ./scripts/bootstrap-replica.sh:/scripts/bootstrap-replica.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rideapp || pg_isready -U replicator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_south_primary_data:
  pg_south_replica_data:
  pg_north_primary_data:
  pg_north_replica_data:
